<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- Grid Pattern -->
  <g opacity="0.05">
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid4)"/>
  </g>

  <!-- Decorative Circles -->
  <circle cx="1100" cy="100" r="200" fill="url(#accentPink)" opacity="0.5"/>
  <circle cx="100" cy="530" r="250" fill="url(#accentPink)" opacity="0.4"/>

  <!-- Main Content Area -->
  <g transform="translate(100, 150)">
    <!-- Badge -->
    <rect x="0" y="-40" width="160" height="32" rx="16" fill="url(#accent7)" opacity="0.9"/>
    <text x="80" y="-18" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="2">MULTIMEDIA</text>

    <!-- Title -->
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      Jasa Editing Video
    </text>
    <text x="0" y="95" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      TikTok &amp; <tspan fill="url(#accent7)">Reels</tspan>
    </text>
    <text x="0" y="155" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">
      Mulai Rp 50rb/video • Fast Turnaround
    </text>

    <!-- Package Cards -->
    <g transform="translate(0, 200)">
      <!-- Basic -->
      <rect x="0" y="0" width="160" height="100" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(236,72,153,0.3)" stroke-width="2"/>
      <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ec4899" text-anchor="middle">BASIC</text>
      <text x="80" y="55" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">50K</text>
      <text x="80" y="80" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">15-30 detik</text>

      <!-- Standard -->
      <rect x="180" y="0" width="160" height="100" rx="12" fill="rgba(236,72,153,0.1)" stroke="url(#accent7)" stroke-width="2"/>
      <rect x="180" y="0" width="160" height="24" rx="12" fill="url(#accent7)"/>
      <text x="260" y="17" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">BEST</text>
      <text x="260" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">100K</text>
      <text x="260" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">30-60 detik</text>

      <!-- Premium -->
      <rect x="360" y="0" width="160" height="100" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(236,72,153,0.3)" stroke-width="2"/>
      <text x="440" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ec4899" text-anchor="middle">PREMIUM</text>
      <text x="440" y="55" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">200K</text>
      <text x="440" y="80" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">60-120 detik</text>
    </g>

    <!-- Promo -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="350" height="40" rx="20" fill="url(#accent7)" opacity="0.2"/>
      <text x="20" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff">🎉 Paket 10 video GRATIS 1 video!</text>
    </g>
  </g>

  <!-- Right Side Illustration -->
  <g transform="translate(720, 130)">
    <!-- Phone Frame -->
    <rect x="50" y="0" width="180" height="360" rx="25" fill="#1e293b" stroke="url(#accent7)" stroke-width="3"/>
    <rect x="60" y="15" width="160" height="330" rx="8" fill="#0f172a"/>

    <!-- Video Content in Phone -->
    <rect x="70" y="30" width="140" height="200" rx="8" fill="url(#accent8)" opacity="0.3"/>

    <!-- Play Button -->
    <circle cx="140" cy="130" r="35" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="2"/>
    <path d="M130 115 L155 130 L130 145 Z" fill="#ffffff"/>

    <!-- Interface Elements -->
    <rect x="75" y="245" width="130" height="4" rx="2" fill="#334155"/>
    <circle cx="95" cy="265" r="15" fill="url(#accent7)" opacity="0.6"/>
    <text x="95" y="270" font-size="14" fill="#fff" text-anchor="middle">♥</text>
    <circle cx="125" cy="265" r="15" fill="url(#accent7)" opacity="0.6"/>
    <text x="125" y="270" font-size="14" fill="#fff" text-anchor="middle">💬</text>
    <circle cx="155" cy="265" r="15" fill="url(#accent7)" opacity="0.6"/>
    <text x="155" y="270" font-size="14" fill="#fff" text-anchor="middle">↗</text>

    <!-- Bottom Navigation -->
    <rect x="60" y="310" width="160" height="35" fill="#1e293b"/>
    <circle cx="95" cy="327" r="8" fill="#334155"/>
    <rect x="115" y="322" width="40" height="10" rx="5" fill="#334155"/>
    <rect x="165" y="322" width="30" height="10" rx="5" fill="#334155"/>

    <!-- TikTok/Reels Icons Floating -->
    <g transform="translate(-30, -20)">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="#000000" stroke="url(#accent7)" stroke-width="2"/>
      <text x="30" y="42" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle">♪</text>
    </g>

    <g transform="translate(250, 50)">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#accent7)" opacity="0.9"/>
      <text x="30" y="42" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle">▶</text>
    </g>

    <g transform="translate(270, 280)">
      <circle cx="0" cy="0" r="25" fill="url(#accent7)" opacity="0.7"/>
      <text x="0" y="7" font-size="18" text-anchor="middle">🎬</text>
    </g>

    <g transform="translate(-40, 300)">
      <circle cx="0" cy="0" r="22" fill="url(#accent8)" opacity="0.6"/>
      <text x="0" y="6" font-size="16" text-anchor="middle">✨</text>
    </g>
  </g>

  <!-- Logo/Badge -->
  <g transform="translate(1050, 50)">
    <circle cx="0" cy="0" r="40" fill="url(#accent7)" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="url(#accent7)"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">єκ</text>
  </g>
</svg>