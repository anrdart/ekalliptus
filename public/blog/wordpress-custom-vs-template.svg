<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Grid Pattern -->
  <g opacity="0.05">
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid3)"/>
  </g>

  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="200" fill="url(#accentBlue)" opacity="0.5"/>
  <circle cx="1100" cy="530" r="250" fill="url(#accentBlue)" opacity="0.4"/>

  <!-- Main Content Area -->
  <g transform="translate(100, 150)">
    <!-- Badge -->
    <rect x="0" y="-40" width="140" height="32" rx="16" fill="url(#accent5)" opacity="0.9"/>
    <text x="70" y="-18" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="2">WORDPRESS</text>

    <!-- Title -->
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff">
      Custom vs Template:
    </text>
    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="40" font-weight="600" fill="#94a3b8">
      Mana yang Lebih Baik?
    </text>

    <!-- Comparison Table -->
    <g transform="translate(0, 140)">
      <!-- Custom Card -->
      <rect x="0" y="0" width="280" height="130" rx="12" fill="rgba(14,165,233,0.1)" stroke="url(#accent5)" stroke-width="2"/>
      <rect x="0" y="0" width="280" height="40" rx="12" fill="url(#accent5)"/>
      <rect x="0" y="20" width="280" height="20" fill="url(#accent5)"/>
      <text x="140" y="27" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">CUSTOM</text>

      <g transform="translate(20, 55)">
        <text y="0" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">✓ Desain 100% Unique</text>
        <text y="20" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">✓ Performa Optimal</text>
        <text y="40" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">✓ SEO Friendly</text>
        <text y="60" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">✗ Biaya Lebih Tinggi</text>
      </g>

      <!-- Template Card -->
      <rect x="300" y="0" width="280" height="130" rx="12" fill="rgba(245,158,11,0.1)" stroke="url(#accent6)" stroke-width="2"/>
      <rect x="300" y="0" width="280" height="40" rx="12" fill="url(#accent6)"/>
      <rect x="300" y="20" width="280" height="20" fill="url(#accent6)"/>
      <text x="440" y="27" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">TEMPLATE</text>

      <g transform="translate(320, 55)">
        <text y="0" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">✓ Lebih Hemat</text>
        <text y="20" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">✓ Cepat (3-7 hari)</text>
        <text y="40" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">✓ Mudah Digunakan</text>
        <text y="60" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">✗ Tampilan Bisa Mirip</text>
      </g>
    </g>
  </g>

  <!-- Right Side Illustration -->
  <g transform="translate(750, 180)">
    <!-- WordPress Logo Representation -->
    <circle cx="200" cy="100" r="80" fill="url(#accent5)" opacity="0.2"/>
    <text x="200" y="130" font-size="80" text-anchor="middle" opacity="0.8">ⓦ</text>

    <!-- Code Editor Window -->
    <rect x="0" y="50" width="200" height="150" rx="8" fill="#1e293b" stroke="url(#accent5)" stroke-width="2"/>
    <!-- Window controls -->
    <circle cx="20" cy="70" r="6" fill="#ef4444"/>
    <circle cx="40" cy="70" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="70" r="6" fill="#22c55e"/>
    <!-- Code lines -->
    <rect x="20" y="95" width="160" height="4" rx="2" fill="#0ea5e9"/>
    <rect x="30" y="110" width="80" height="4" rx="2" fill="#8b5cf6"/>
    <rect x="30" y="125" width="120" height="4" rx="2" fill="#334155"/>
    <rect x="30" y="140" width="100" height="4" rx="2" fill="#334155"/>
    <rect x="30" y="155" width="60" height="4" rx="2" fill="#06b6d4"/>
    <rect x="30" y="170" width="90" height="4" rx="2" fill="#334155"/>

    <!-- Theme Panel -->
    <rect x="220" y="180" width="160" height="120" rx="8" fill="#1e293b" stroke="url(#accent6)" stroke-width="2"/>
    <text x="300" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">THEME OPTIONS</text>
    <rect x="240" y="220" width="120" height="8" rx="4" fill="#334155"/>
    <rect x="240" y="235" width="100" height="8" rx="4" fill="#334155"/>
    <rect x="240" y="250" width="80" height="8" rx="4" fill="#f59e0b"/>
    <rect x="240" y="265" width="90" height="8" rx="4" fill="#334155"/>
    <rect x="240" y="280" width="70" height="8" rx="4" fill="#334155"/>

    <!-- Floating Elements -->
    <g transform="translate(420, 30)">
      <circle cx="0" cy="0" r="25" fill="url(#accent5)" opacity="0.8" filter="url(#glow3)"/>
      <text x="0" y="6" font-size="18" text-anchor="middle">⚙️</text>
    </g>

    <g transform="translate(-30, 320)">
      <circle cx="0" cy="0" r="22" fill="url(#accent6)" opacity="0.7"/>
      <text x="0" y="6" font-size="16" text-anchor="middle">🎨</text>
    </g>
  </g>

  <!-- Logo/Badge -->
  <g transform="translate(1050, 50)">
    <circle cx="0" cy="0" r="40" fill="url(#accent5)" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="url(#accent5)"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">єκ</text>
  </g>
</svg>