<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent9" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent10" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- Grid Pattern -->
  <g opacity="0.05">
    <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid5)"/>
  </g>

  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="200" fill="url(#accentGreen)" opacity="0.5"/>
  <circle cx="1100" cy="530" r="250" fill="url(#accentGreen)" opacity="0.4"/>

  <!-- Main Content Area -->
  <g transform="translate(100, 150)">
    <!-- Badge -->
    <rect x="0" y="-40" width="120" height="32" rx="16" fill="url(#accent9)" opacity="0.9"/>
    <text x="60" y="-18" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="2">TIPS</text>

    <!-- Title -->
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      5 Tanda Website
    </text>
    <text x="0" y="95" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      Butuh <tspan fill="url(#accent10)">Redesign</tspan>
    </text>
    <text x="0" y="155" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">
      &amp; Maintenance Rutin • Mulai Rp 500rb/bulan
    </text>

    <!-- Warning Signs -->
    <g transform="translate(0, 200)">
      <!-- Sign 1 -->
      <g transform="translate(0, 0)">
        <circle cx="20" cy="0" r="18" fill="url(#accent10)" opacity="0.8"/>
        <text x="20" y="5" font-size="16" fill="#fff" text-anchor="middle">🐌</text>
        <text x="50" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">Loading &gt; 3 detik</text>
      </g>

      <!-- Sign 2 -->
      <g transform="translate(0, 35)">
        <circle cx="20" cy="0" r="18" fill="url(#accent10)" opacity="0.8"/>
        <text x="20" y="5" font-size="16" fill="#fff" text-anchor="middle">📱</text>
        <text x="50" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">Tidak mobile-friendly</text>
      </g>

      <!-- Sign 3 -->
      <g transform="translate(0, 70)">
        <circle cx="20" cy="0" r="18" fill="url(#accent10)" opacity="0.8"/>
        <text x="20" y="5" font-size="16" fill="#fff" text-anchor="middle">🔒</text>
        <text x="50" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">Security warning</text>
      </g>

      <!-- Sign 4 -->
      <g transform="translate(0, 105)">
        <circle cx="20" cy="0" r="18" fill="url(#accent10)" opacity="0.8"/>
        <text x="20" y="5" font-size="16" fill="#fff" text-anchor="middle">📉</text>
        <text x="50" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">Traffic menurun</text>
      </g>

      <!-- Sign 5 -->
      <g transform="translate(0, 140)">
        <circle cx="20" cy="0" r="18" fill="url(#accent10)" opacity="0.8"/>
        <text x="20" y="5" font-size="16" fill="#fff" text-anchor="middle">🎨</text>
        <text x="50" y="5" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">Desain ketinggalan</text>
      </g>
    </g>
  </g>

  <!-- Right Side Illustration -->
  <g transform="translate(700, 150)">
    <!-- Monitor/Website -->
    <rect x="0" y="0" width="320" height="200" rx="12" fill="#1e293b" stroke="url(#accent9)" stroke-width="2"/>
    <rect x="15" y="15" width="290" height="170" rx="4" fill="#0f172a"/>

    <!-- Website Content - Before (left) and After (right) comparison -->
    <!-- Warning Side -->
    <rect x="25" y="30" width="130" height="140" rx="6" fill="rgba(239,68,68,0.1)" stroke="url(#accent10)" stroke-width="1" stroke-dasharray="4"/>
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">BEFORE</text>
    <rect x="35" y="70" width="40" height="6" rx="3" fill="#334155"/>
    <rect x="35" y="82" width="50" height="6" rx="3" fill="#334155"/>
    <rect x="35" y="94" width="35" height="6" rx="3" fill="#334155"/>
    <text x="90" y="130" font-family="system-ui, sans-serif" font-size="28" fill="#ef4444" text-anchor="middle">⚠️</text>
    <text x="90" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Slow &amp; Unsafe</text>

    <!-- Good Side -->
    <rect x="165" y="30" width="130" height="140" rx="6" fill="rgba(34,197,94,0.1)" stroke="url(#accent9)" stroke-width="1"/>
    <text x="230" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">AFTER</text>
    <rect x="175" y="70" width="50" height="6" rx="3" fill="url(#accent9)"/>
    <rect x="175" y="82" width="60" height="6" rx="3" fill="url(#accent9)"/>
    <rect x="175" y="94" width="45" height="6" rx="3" fill="url(#accent9)"/>
    <text x="230" y="130" font-family="system-ui, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">✓</text>
    <text x="230" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Fast &amp; Secure</text>

    <!-- Monitor Stand -->
    <rect x="130" y="200" width="60" height="30" fill="#334155"/>
    <rect x="100" y="230" width="120" height="10" rx="4" fill="#1e293b"/>

    <!-- Maintenance Checklist -->
    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="320" height="100" rx="12" fill="rgba(34,197,94,0.1)" stroke="url(#accent9)" stroke-width="1"/>
      <text x="160" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">MAINTENANCE INCLUDES:</text>

      <g transform="translate(20, 45)">
        <circle cx="10" cy="0" r="8" fill="url(#accent9)"/>
        <text x="10" y="4" font-size="10" fill="#fff" text-anchor="middle">✓</text>
        <text x="25" y="4" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">Weekly Backup</text>
      </g>

      <g transform="translate(20, 65)">
        <circle cx="10" cy="0" r="8" fill="url(#accent9)"/>
        <text x="10" y="4" font-size="10" fill="#fff" text-anchor="middle">✓</text>
        <text x="25" y="4" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">Security Updates</text>
      </g>

      <g transform="translate(170, 45)">
        <circle cx="10" cy="0" r="8" fill="url(#accent9)"/>
        <text x="10" y="4" font-size="10" fill="#fff" text-anchor="middle">✓</text>
        <text x="25" y="4" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">Performance Check</text>
      </g>

      <g transform="translate(170, 65)">
        <circle cx="10" cy="0" r="8" fill="url(#accent9)"/>
        <text x="10" y="4" font-size="10" fill="#fff" text-anchor="middle">✓</text>
        <text x="25" y="4" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">24/7 Monitoring</text>
      </g>
    </g>
  </g>

  <!-- Floating Elements -->
  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="25" fill="url(#accent10)" opacity="0.8" filter="url(#glow5)"/>
    <text x="0" y="6" font-size="18" text-anchor="middle">⚡</text>
  </g>

  <g transform="translate(550, 450)">
    <circle cx="0" cy="0" r="22" fill="url(#accent9)" opacity="0.7"/>
    <text x="0" y="6" font-size="16" text-anchor="middle">🛡️</text>
  </g>

  <!-- Logo/Badge -->
  <g transform="translate(1050, 50)">
    <circle cx="0" cy="0" r="40" fill="url(#accent9)" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="url(#accent9)"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">єκ</text>
  </g>
</svg>