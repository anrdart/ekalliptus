<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>

  <!-- Grid Pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="200" fill="url(#accent2)" opacity="0.5"/>
  <circle cx="1100" cy="530" r="250" fill="url(#accent2)" opacity="0.4"/>

  <!-- Main Content Area -->
  <g transform="translate(100, 150)">
    <!-- Badge -->
    <rect x="0" y="-40" width="180" height="32" rx="16" fill="url(#accent1)" opacity="0.9"/>
    <text x="90" y="-18" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="2">WEB DEVELOPMENT</text>

    <!-- Title -->
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      Jasa Pembuatan
    </text>
    <text x="0" y="95" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      Website <tspan fill="url(#accent1)">Tegal</tspan>
    </text>
    <text x="0" y="155" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">
      Harga &amp; Portfolio 2026
    </text>

    <!-- Features -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="280" height="44" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="30" cy="22" r="12" fill="url(#accent1)"/>
      <path d="M25 22 L30 27 L38 18" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="55" y="28" font-family="system-ui, sans-serif" font-size="16" fill="#e2e8f0">Mulai Rp 1,5 Juta</text>

      <rect x="300" y="0" width="240" height="44" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="330" cy="22" r="12" fill="url(#accent1)"/>
      <path d="M325 22 L330 27 L338 18" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="355" y="28" font-family="system-ui, sans-serif" font-size="16" fill="#e2e8f0">7-14 Hari Kerja</text>

      <rect x="560" y="0" width="240" height="44" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="590" cy="22" r="12" fill="url(#accent1)"/>
      <path d="M585 22 L590 27 L598 18" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="615" y="28" font-family="system-ui, sans-serif" font-size="16" fill="#e2e8f0">Gratis Konsultasi</text>
    </g>

    <!-- Contact -->
    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="320" height="40" rx="20" fill="url(#accent1)"/>
      <text x="160" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">📞 0819-9990-0306</text>
    </g>
  </g>

  <!-- Right Side Illustration -->
  <g transform="translate(750, 180)">
    <!-- Laptop -->
    <rect x="0" y="0" width="320" height="200" rx="12" fill="#1e293b" stroke="url(#accent1)" stroke-width="2"/>
    <rect x="15" y="15" width="290" height="170" rx="4" fill="#0f172a"/>
    <!-- Screen Content -->
    <rect x="30" y="35" width="120" height="8" rx="4" fill="url(#accent1)"/>
    <rect x="30" y="55" width="200" height="6" rx="3" fill="#334155"/>
    <rect x="30" y="70" width="180" height="6" rx="3" fill="#334155"/>
    <rect x="30" y="85" width="160" height="6" rx="3" fill="#334155"/>
    <!-- Code lines -->
    <rect x="160" y="120" width="80" height="6" rx="3" fill="#06b6d4"/>
    <rect x="160" y="135" width="100" height="6" rx="3" fill="#8b5cf6"/>
    <rect x="160" y="150" width="60" height="6" rx="3" fill="#3b82f6"/>
    <!-- Laptop Base -->
    <rect x="-30" y="200" width="380" height="20" rx="4" fill="#334155"/>

    <!-- Floating Elements -->
    <g transform="translate(260, -30)">
      <circle cx="0" cy="0" r="30" fill="url(#accent1)" opacity="0.8" filter="url(#glow)"/>
      <text x="0" y="8" font-size="24" text-anchor="middle">🌐</text>
    </g>

    <g transform="translate(-30, 50)">
      <circle cx="0" cy="0" r="25" fill="url(#accent1)" opacity="0.6"/>
      <text x="0" y="6" font-size="20" text-anchor="middle">💻</text>
    </g>

    <g transform="translate(350, 180)">
      <circle cx="0" cy="0" r="22" fill="url(#accent1)" opacity="0.7"/>
      <text x="0" y="6" font-size="18" text-anchor="middle">🚀</text>
    </g>
  </g>

  <!-- Logo/Badge -->
  <g transform="translate(1050, 50)">
    <circle cx="0" cy="0" r="40" fill="url(#accent1)" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="url(#accent1)"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">єκ</text>
  </g>
</svg>